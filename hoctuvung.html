<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập từ vựng</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #1e293b;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 10px;
}

.sidebar a:hover {
    background: #334155;
}

/* Content */
.content {
    flex: 1;
    background: #f1f5f9;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Nút học lại */
.review-btn-top {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #f59e0b;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 100%;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

#wordBox {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

#word {
    font-size: 28px;
    font-weight: bold;
}

.speak-btn {
    background: #3b82f6;
    color: white;
    border-radius: 50%;
    width: 35px;
    height: 35px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 15px;
}

button {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin: 5px;
}

.check-btn { background: #22c55e; color: white; }
.next-btn { background: #3b82f6; color: white; }

#result { margin-top: 10px; font-weight: bold; }
#example { margin-top: 10px; color: #555; }

/* Mobile */
@media(max-width:768px){
    body { flex-direction: column; }
    .sidebar { width: 100%; height: auto; display: flex; }
}
</style>
</head>

<body>

<div class="sidebar">
      <a href="index.html">🏠 Trang chính</a>
    <a href="practice.html">📘 Luyện tập</a>
    <a href="vocab.html">🧠 Từ vựng Zy cần ôn</a>
    <a href="hoctuvung.html">🔄 Ôn tập</a>
</div>

<div class="content">

<button class="review-btn-top" onclick="reviewWrong()">
    🔁 Học lại từ sai
</button>

<div class="card">

<h2>Ôn tập từ vựng</h2>

<div id="wordBox">
    <div id="word"></div>
    <button class="speak-btn" onclick="speak()">🔊</button>
</div>

<input id="answer" placeholder="Nhập đáp án...">

<div>
    <button class="check-btn" onclick="check()">Kiểm tra</button>
    <button class="next-btn" onclick="nextWord()">Từ mới</button>
</div>

<p id="result"></p>
<p id="example"></p>

</div>
</div>

<script>
const words = [
  
 {en:"scheduled", vi:["được lên lịch", "được sắp xếp thời gian"]},
 {en:"arrive", vi:["đến nơi", "tới"]},
 {en:"We apologize for the inconvenience.", vi:["Chúng tôi xin lỗi vì sự bất tiện này."]},
 {en:"conditions", vi:["điều kiện", "tình trạng"]},
 {en:"during", vi:["trong suốt","trong lúc" ,"trong khoảng thời gian"]},
 {en:"inform", vi:["thông báo", "báo tin"]},
 {en:"attendance", vi:["sự tham gia", "sự có mặt", "số lượng người dự"]},
{en:"explain", vi:["giải thích", "thanh minh"]},

{en:"caused", vi:["gây ra", "làm cho"]},
{en:"announce", vi:["thông báo", "tuyên bố", "trình bày"]},
{en:"delivery", vi:["sự giao hàng", "sự phân phát"]},
{en:"organized", vi:["có tổ chức", "ngăn nắp", "được sắp xếp"]},
{en:"register", vi:["đăng ký", "ghi sổ"]},
{en:"employees", vi:["nhân viên", "người lao động", "người làm công"]},
{en:"mentioned", vi:["được đề cập", "đã nói đến"]},
{en:"successful", vi:["thành công", "thành đạt", "có kết quả tốt"]},
{en:"purpose", vi:["mục đích", "ý định"]},
{en:"course", vi:["khóa học","tất nhiên"]},
{en:"different", vi:["khác nhau"]},
{en:"required", vi:["được yêu cầu", "bắt buộc", "cần thiết"]},
{en:"employees", vi:["nhân viên", "người làm công", "người lao động"]},
{en:"large", vi:["lớn"]},
];

const examples = {
    "explain": ["Can you explain how this machine works?"],
"during": ["Please keep your phone silent during the meeting."],
"caused": ["The heavy rain caused a massive traffic jam."],
    "attendance": ["The teacher took attendance at the beginning of class."],

"announce": ["The company will announce the new policy tomorrow."],

"organized": ["The event was well organized by the marketing team."],

"employees": ["The manager rewarded all employees for their hard work."],

"successful": ["She is a successful business owner in the fashion industry."],
    "above": ["The picture is above the table."],
    "mentioned": ["He mentioned the new project during the lunch break."],

"required": ["A valid ID is required to enter the building."],

"employees": ["The company provides free health insurance for all employees."],

"purpose": ["The purpose of this training is to improve your skills."],

"register": ["New members must register at the front desk."],

"delivery": ["The pizza delivery arrived earlier than expected."],

"inform": ["I am writing to inform you about the schedule change."],

"scheduled": ["The meeting is scheduled for 10 AM on Monday."],

"arrive": ["What time does the train arrive in London?"],

"conditions": ["The contract outlines the terms and conditions of the sale."],

"We apologize for the inconvenience.": ["The road is closed for repairs; we apologize for the inconvenience."],
     "against": ["He leaned against the wall."],
        "around": ["We walked around the park."],
        "below": ["The temperature is below zero."],
        "between": ["She sat between her friends."],
        "each": ["Each student has a book."],
        "even": ["Even a child can do it."],
        "few": ["I have a few friends here."],
        "find": ["I can't find my keys."],
        "take": ["Please take your bag."],
        "those": ["Those are my shoes."],
        "animal": ["The dog is a friendly animal."],
        "answer": ["She gave the correct answer."],
        "cold": ["It is very cold today."],
        "course": ["I am taking an English course."],
        "different": ["We have different ideas."],
        "earth": ["The Earth goes around the sun."],
        "example": ["This is a good example."],
        "grow": ["Plants grow fast in summer."],
        "hand": ["He raised his hand."],
        "hard": ["This test is very hard."],
        "high": ["The mountain is very high."],
        "large": ["They live in a large house."],
        "leave": ["I will leave at 7 PM."],
        "make": ["She can make a cake."],
        "move": ["We will move to a new house."],
        "night": ["I study at night."],
        "often": ["I often go to the gym."],
        "point": ["He made an important point."],
        "sentence": ["Write a simple sentence."],
};

let current;
let mode; // 0: Anh->Việt, 1: Việt->Anh
let wrongList = JSON.parse(localStorage.getItem("wrongWords")) || [];
let isReview = false;

/* Chuẩn hóa */
function normalize(str){
    return str.toLowerCase().trim().replace(/\s+/g," ");
}

/* Random từ */
function nextWord(){
    isReview = false;
    current = words[Math.floor(Math.random()*words.length)];
    mode = Math.floor(Math.random()*2);

    showWord();
}

/* Hiển thị */
function showWord(){
    if(mode===0){
        document.getElementById("word").innerText = current.en;
    } else {
        document.getElementById("word").innerText = current.vi.join(" / ");
    }

    document.getElementById("answer").value="";
    document.getElementById("result").innerText="";
    document.getElementById("example").innerText="";
}

/* Kiểm tra */
function check(){
    let ans = normalize(document.getElementById("answer").value);
    let correct = false;

    if(mode===0){
        correct = current.vi.some(v => normalize(v) === ans);
    } else {
        correct = normalize(current.en) === ans;
    }

    if(correct){
        document.getElementById("result").innerText="✅ Đúng!";
    } else {
        document.getElementById("result").innerText =
        "❌ Sai! " + current.en + " = " + current.vi.join(", ");

        if(!wrongList.find(w=>w.en===current.en)){
            wrongList.push(current);
            localStorage.setItem("wrongWords", JSON.stringify(wrongList));
        }
    }

    generateExample();
}

/* Ví dụ */
function generateExample(){
    let ex = examples[current.en];
    if(ex){
        let random = ex[Math.floor(Math.random()*ex.length)];
        document.getElementById("example").innerText = "📌 Ví dụ: " + random;
    }
}

/* Phát âm */
function speak(){
    let speech = new SpeechSynthesisUtterance(current.en);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}

/* Học lại từ sai */
function reviewWrong(){
    if(wrongList.length === 0){
        alert("Không có từ sai 😎");
        return;
    }

    isReview = true;
    current = wrongList[Math.floor(Math.random()*wrongList.length)];
    mode = Math.floor(Math.random()*2);

    showWord();
}

/* Enter */
document.getElementById("answer").addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        check();
    }
});

/* Start */
nextWord();
</script>

</body>
</html>
