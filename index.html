<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học động từ bất quy tắc</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #e6f2ff;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        input {
            padding: 8px;
            margin: 5px;
        }
        #v1 {
            font-size: 30px;
            margin: 20px;
        }
    </style>
</head>
<body>

<h1>Học động từ bất quy tắc</h1>

<button onclick="startGame()">Bắt đầu</button>

<div id="game" style="display:none;">
    <div id="v1"></div>

    <input id="v2" placeholder="Nhập V2">
    <input id="v3" placeholder="Nhập V3"><br>

    <button onclick="check()">Kiểm tra</button>

    <p id="result"></p>
</div>
<button onclick="goToPractice()" style="background: orange;">
    Luyện tập nâng cao
</button>

<!-- NÚT MỚI -->
<button onclick="goToPractice()">Luyện tập nâng cao</button>

{v1:"wake", v2:"woke", v3:"woken", mean:"thức dậy"},

{v1:"win", v2:"won", v3:"won", mean:"thắng"},
{v1:"write", v2:"wrote", v3:"written", mean:"viết"},
];

let current;

function startGame() {
    document.getElementById("game").style.display = "block";
    document.getElementById("result").innerText = "";

    current = verbs[Math.floor(Math.random() * verbs.length)];

    document.getElementById("v1").innerText = current.v1;
    document.getElementById("v2").value = "";
    document.getElementById("v3").value = "";
}

function check() {
    let v2 = document.getElementById("v2").value.trim().toLowerCase();
    let v3 = document.getElementById("v3").value.trim().toLowerCase();

    if (v2 === current.v2 && v3 === current.v3) {
        document.getElementById("result").innerText = "✅ Đúng!";
    } else {
        document.getElementById("result").innerText =
            "❌ Sai! Đúng là: " + current.v2 + " - " + current.v3 + " (" + current.mean + ")";
    }
}
function goToPractice() {
    window.location.href = "practice.html";
}
</script>

</body>
