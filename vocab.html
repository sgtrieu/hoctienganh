<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #1e293b;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 10px;
}

.sidebar a:hover {
    background: #334155;
}

/* Content */
.content {
    flex: 1;
    padding: 20px;
    background: #f1f5f9;
}

/* Top button */
.top-btn {
    position: fixed;
    top: 15px;
    right: 20px;
    background: #6366f1;
    color: white;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
}

/* Card */
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    max-width: 800px;
    margin: auto;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.item {
    margin-bottom: 15px;
}

.item span {
    font-weight: bold;
}

.item input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 5px;
}

.result {
    font-size: 13px;
    margin-top: 3px;
}

.correct {
    color: green;
}

.wrong {
    color: red;
}

/* Mobile */
@media(max-width:768px){
    body { flex-direction: column; }
    .sidebar { width: 100%; height: auto; display: flex; overflow-x:auto; }
    .sidebar a { flex:1; text-align:center; }
}
</style>
</head>

let mode = 0;

/* render */
function render(){
    let html = "";

    words.forEach((w,i)=>{
        let question = mode===0 ? w.zh : w.vi;

        html += `
        <div class="item">
            <span>${i+1}. ${question}</span>
            <input placeholder="Nhập đáp án..." 
                   onkeydown="handleKey(event, this, ${i})">
            <div id="result${i}" class="result"></div>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

/* chuẩn hóa */
function normalize(str){
    return str.toLowerCase().trim().replace(/\s+/g," ");
}

/* check */
function check(input, index){
    let w = words[index];
    let correctAnswer = mode===0 ? w.vi : w.zh;
    let resultBox = document.getElementById("result"+index);

    if(normalize(input.value) === normalize(correctAnswer)){
        resultBox.innerHTML = "✅ Đúng";
        resultBox.className = "result correct";
    } else {
        resultBox.innerHTML = "❌ Sai → " + correctAnswer;
        resultBox.className = "result wrong";
    }
}

/* bắt Enter */
function handleKey(e, input, index){
    if(e.key === "Enter"){
        check(input, index);
    }
}

/* đảo chiều */
function toggleMode(){
    mode = mode===0 ? 1 : 0;
    render();
}

render();
